
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Dashboard</title>
<style>
body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#0f172a;
color:#e2e8f0;
}
header{
padding:16px;
font-size:22px;
font-weight:bold;
text-align:center;
background:#020617;
border-bottom:1px solid #1e293b;
}
table{
width:100%;
border-collapse:collapse;
}
th,td{
padding:10px;
text-align:left;
border-bottom:1px solid #1e293b;
font-size:14px;
}
th{
background:#020617;
position:sticky;
top:0;
}
.green{color:#22c55e}
.red{color:#ef4444}
.container{
max-width:1200px;
margin:auto;
padding:10px;
}
@media(max-width:700px){
th:nth-child(4),td:nth-child(4),
th:nth-child(5),td:nth-child(5){
display:none;
}
}
</style>
</head>

<body>

<header>Live Crypto Market Dashboard</header>

<div class="container">
<p id="status">Loading live data...</p>

<table id="cryptoTable">
<thead>
<tr>
<th>#</th>
<th>Coin</th>
<th>Price</th>
<th>24h %</th>
<th>Volume</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

let cryptoMap = {}
let tableBody = document.querySelector("#cryptoTable tbody")

async function fetchWithFailover(){

const sources = [
async ()=>{
const r = await fetch("https://api.binance.com/api/v3/ticker/24hr")
let data = await r.json()
return data.slice(0,100).map((c,i)=>({
rank:i+1,
symbol:c.symbol.replace("USDT",""),
price:parseFloat(c.lastPrice),
change:parseFloat(c.priceChangePercent),
volume:parseFloat(c.quoteVolume)
}))
},

async ()=>{
const r = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&per_page=100&page=1")
let data = await r.json()
return data.map((c,i)=>({
rank:i+1,
symbol:c.symbol.toUpperCase(),
price:c.current_price,
change:c.price_change_percentage_24h,
volume:c.total_volume
}))
},

async ()=>{
const r = await fetch("https://api.coincap.io/v2/assets?limit=100")
let j = await r.json()
return j.data.map((c,i)=>({
rank:i+1,
symbol:c.symbol,
price:parseFloat(c.priceUsd),
change:parseFloat(c.changePercent24Hr),
volume:parseFloat(c.volumeUsd24Hr)
}))
}
]

for(const s of sources){
try{
let data = await s()
if(data && data.length){
return data
}
}catch(e){}
}

throw new Error("All APIs failed")

}

function renderInitial(data){

let frag=document.createDocumentFragment()

data.forEach(c=>{

cryptoMap[c.symbol]=c

let tr=document.createElement("tr")
tr.id="row-"+c.symbol

tr.innerHTML=`
<td>${c.rank}</td>
<td>${c.symbol}</td>
<td id="p-${c.symbol}">$${c.price.toFixed(4)}</td>
<td id="c-${c.symbol}" class="${c.change>=0?'green':'red'}">${c.change.toFixed(2)}%</td>
<td>$${Math.round(c.volume).toLocaleString()}</td>
`

frag.appendChild(tr)

})

tableBody.appendChild(frag)

document.getElementById("status").innerText="Live prices streaming"

}

function startSocket(){

let ws=new WebSocket("wss://stream.binance.com:9443/ws/!ticker@arr")

ws.onmessage=(msg)=>{

let arr=JSON.parse(msg.data)

arr.forEach(t=>{

let sym=t.s.replace("USDT","")

if(!cryptoMap[sym]) return

let price=parseFloat(t.c)
let change=parseFloat(t.P)

let p=document.getElementById("p-"+sym)
let c=document.getElementById("c-"+sym)

if(p){
p.textContent="$"+price.toFixed(4)
}

if(c){
c.textContent=change.toFixed(2)+"%"
c.className=change>=0?"green":"red"
}

})

}

ws.onclose=()=>{
setTimeout(startSocket,3000)
}

}

async function init(){

try{

let data=await fetchWithFailover()

renderInitial(data)

startSocket()

}catch(e){

document.getElementById("status").innerText="Failed loading data"

}

}

init()

</script>

</body>
</html>
