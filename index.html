<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaryaaMarket | Global Intelligence Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg: #0D0D0D;
            --card: rgba(255, 255, 255, 0.03);
            --card-hover: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.08);
            --blue: #00D4FF;
            --green: #00FF88;
            --red: #FF3B3B;
            --yellow: #FFD700;
            --orange: #FF8C00;
            --text: #FFFFFF;
            --text-dim: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* --- Ticker & Nav --- */
        nav { position: sticky; top: 0; z-index: 1000; background: rgba(13, 13, 13, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.4rem; color: var(--blue); text-transform: uppercase; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .live-indicator { font-size: 0.7rem; font-weight: 800; color: var(--green); display: flex; align-items: center; gap: 5px; }
        .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* --- Main Layout --- */
        .container { padding: 2rem 5%; max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 2.5fr 1fr; gap: 2rem; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        
        /* --- Tables --- */
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: var(--text-dim); font-size: 0.7rem; padding: 1rem 0.5rem; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        td { padding: 1rem 0.5rem; border-bottom: 1px solid var(--border); }
        tr.clickable:hover { background: rgba(255,255,255,0.02); cursor: pointer; }

        /* --- Modal System --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000; display: none; overflow-y: auto; padding: 40px 5%; }
        .modal-content { background: var(--bg); border: 1px solid var(--border); width: 100%; max-width: 1100px; margin: 0 auto; border-radius: 20px; padding: 2.5rem; position: relative; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-tabs { display: flex; gap: 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
        .modal-tab { padding: 1rem 0; color: var(--text-dim); cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        .modal-tab.active { color: var(--blue); border-bottom: 2px solid var(--blue); }
        .close-modal { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text-dim); cursor: pointer; }

        /* --- Gauge Styles --- */
        .gauge-label { text-align: center; font-weight: 800; font-size: 1rem; margin-top: -15px; }
        .gauge-comparison { font-size: 0.7rem; color: var(--text-dim); text-align: center; margin-top: 5px; }

        /* --- Unlock Card --- */
        .unlock-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .unlock-card:hover { border-color: var(--blue); transform: translateX(5px); }
        .countdown-timer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; text-align: center; margin-top: 10px; }
        .timer-unit { background: #111; padding: 5px; border-radius: 4px; border: 1px solid var(--border); }
        .timer-val { display: block; font-weight: 800; font-size: 1rem; font-family: 'JetBrains Mono'; }
        .timer-label { font-size: 0.5rem; color: var(--text-dim); }
        .impact-badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 800; }

        /* --- Metrics Grid --- */
        .onchain-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .metric-box { background: #111; padding: 1rem; border-radius: 8px; border: 1px solid var(--border); }
        .metric-box label { font-size: 0.65rem; color: var(--text-dim); display: block; margin-bottom: 5px; }
        .metric-box b { font-family: 'JetBrains Mono'; font-size: 1rem; }

        .price-up { color: var(--green); }
        .price-down { color: var(--red); }
        .spark-canvas { width: 80px; height: 30px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i data-lucide="zap"></i> WaryaaMarket</div>
        <div class="live-indicator"><span class="live-dot"></span> LIVE TERMINAL</div>
        <div id="gas-stats" style="font-family: 'JetBrains Mono'; font-size: 0.7rem;">ETH GAS: -- GWEI</div>
    </nav>

    <div class="container">
        <!-- Main Panel -->
        <main>
            <div class="card">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; align-items: center;">
                    <h2 style="font-size: 1.1rem;"><i data-lucide="cpu"></i> AI Industry Intelligence</h2>
                </div>
                <table id="stock-table">
                    <thead>
                        <tr>
                            <th>Ticker</th>
                            <th>Price</th>
                            <th>24h %</th>
                            <th>Market Cap</th>
                            <th>Range (Day)</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="stock-body"></tbody>
                </table>
            </div>

            <div class="card">
                <h2 style="font-size: 1.1rem; margin-bottom: 1rem;"><i data-lucide="trending-up"></i> Top Cryptocurrencies</h2>
                <table id="crypto-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>24h %</th>
                            <th>Market Cap</th>
                            <th>7D Trend</th>
                        </tr>
                    </thead>
                    <tbody id="crypto-body"></tbody>
                </table>
            </div>
        </main>

        <!-- Sidebar -->
        <aside>
            <div class="card">
                <h3 style="font-size: 0.9rem; margin-bottom: 1.5rem;">Market Sentiment</h3>
                <div id="fng-container"></div>
            </div>

            <div class="card">
                <h3 style="font-size: 0.9rem; margin-bottom: 1.5rem;">Market Dominance</h3>
                <div id="dom-container"></div>
            </div>

            <div class="card">
                <h3 style="font-size: 0.9rem; margin-bottom: 1.5rem;">Upcoming Token Unlocks</h3>
                <div id="unlock-container"></div>
            </div>
        </aside>
    </div>

    <!-- Modals -->
    <div id="detail-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()"><i data-lucide="x" size="24"></i></button>
            <div id="modal-header"></div>
            <div class="modal-tabs">
                <div class="modal-tab active" onclick="switchModalTab('overview')">Overview</div>
                <div class="modal-tab" onclick="switchModalTab('onchain')">On-Chain Intelligence</div>
                <div class="modal-tab" onclick="switchModalTab('news')">Asset News</div>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        // --- State ---
        let currentViewAsset = null;
        let lastWeekFNG = 72;
        let yesterdayFNG = 68;

        // --- Constants ---
        const STOCK_SYMBOLS = ['NVDA', 'MSFT', 'GOOGL', 'AMD', 'META', 'TSLA', 'ORCL', 'PLTR'];
        const protocolMap = {
            'ethereum': 'ethereum',
            'uniswap': 'uniswap',
            'aave': 'aave',
            'curve-dao-token': 'curve',
            'maker': 'makerdao',
            'lido-dao': 'lido',
            'chainlink': 'chainlink'
        };

        const upcomingUnlocks = [
            { token: 'ARB', name: 'Arbitrum', logo: 'https://assets.coingecko.com/coins/images/16547/small/photo_2023-03-29_21.47.00.jpeg', date: new Date(Date.now() + 6.9 * 24 * 60 * 60 * 1000), amount: 92600000, percentOfSupply: 1.85, type: 'Investor', impact: 'HIGH', vestingType: 'Cliff' },
            { token: 'OP', name: 'Optimism', logo: 'https://assets.coingecko.com/coins/images/25244/small/Optimism.png', date: new Date(Date.now() + 13.5 * 24 * 60 * 60 * 1000), amount: 24160000, percentOfSupply: 2.41, type: 'Team', impact: 'HIGH', vestingType: 'Linear' },
            { token: 'APT', name: 'Aptos', logo: 'https://assets.coingecko.com/coins/images/26455/small/aptos_round.png', date: new Date(Date.now() + 2.8 * 24 * 60 * 60 * 1000), amount: 11314000, percentOfSupply: 2.26, type: 'Foundation', impact: 'HIGH', vestingType: 'Monthly' },
            { token: 'SUI', name: 'Sui', logo: 'https://assets.coingecko.com/coins/images/26375/small/sui_asset.jpeg', date: new Date(Date.now() + 4.2 * 24 * 60 * 60 * 1000), amount: 64758000, percentOfSupply: 2.50, type: 'Investor', impact: 'HIGH', vestingType: 'Linear' }
        ];

        // --- Initialization ---
        async function init() {
            lucide.createIcons();
            fetchFearAndGreed();
            fetchGlobalData();
            fetchCryptoData();
            fetchAIStocks();
            renderUnlocks();
            setInterval(fetchCryptoData, 30000);
            setInterval(fetchAIStocks, 30000);
        }

        // --- Fix Section 4: Fear & Greed SVG Gauge ---
        async function fetchFearAndGreed() {
            const res = await fetch('https://api.alternative.me/fng/?limit=1');
            const data = await res.json();
            const value = data.data[0].value;
            const label = data.data[0].value_classification;
            
            const getColor = (v) => v <= 25 ? '#FF3B3B' : v <= 45 ? '#FF8C00' : v <= 55 ? '#FFD700' : v <= 75 ? '#00CC44' : '#00FF88';
            const color = getColor(value);
            const angle = (value / 100) * 180 - 90;

            document.getElementById('fng-container').innerHTML = `
                <div style="text-align: center;">
                    <svg viewBox="0 0 200 120" width="100%">
                        <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#222" stroke-width="16" stroke-linecap="round"/>
                        <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="${color}" stroke-width="16" stroke-linecap="round" stroke-dasharray="${(value/100)*251}, 251"/>
                        <line x1="100" y1="100" x2="${100 + 65 * Math.cos((angle-90) * Math.PI/180)}" y2="${100 + 65 * Math.sin((angle-90) * Math.PI/180)}" stroke="white" stroke-width="3" stroke-linecap="round"/>
                        <circle cx="100" cy="100" r="5" fill="white"/>
                        <text x="100" y="85" text-anchor="middle" fill="${color}" font-size="28" font-weight="bold">${value}</text>
                    </svg>
                    <div class="gauge-label" style="color:${color}">${label}</div>
                    <div class="gauge-comparison">Yesterday: ${yesterdayFNG} | Last Week: ${lastWeekFNG}</div>
                </div>`;
        }

        // --- Fix Section 5: Dominance SVG Gauge ---
        async function fetchGlobalData() {
            const res = await fetch('https://api.coingecko.com/api/v3/global');
            const data = await res.json();
            const btcDom = data.data.market_cap_percentage.btc.toFixed(1);
            const ethDom = data.data.market_cap_percentage.eth.toFixed(1);
            const otherDom = (100 - btcDom - ethDom).toFixed(1);

            document.getElementById('dom-container').innerHTML = `
                <div style="display: flex; align-items: center; gap: 20px; justify-content: center;">
                    <svg viewBox="0 0 120 120" width="100">
                        <circle cx="60" cy="60" r="45" fill="none" stroke="#F7931A" stroke-width="12" stroke-dasharray="${btcDom * 2.827} 282.7" transform="rotate(-90 60 60)"/>
                        <circle cx="60" cy="60" r="45" fill="none" stroke="#627EEA" stroke-width="12" stroke-dasharray="${ethDom * 2.827} 282.7" stroke-dashoffset="${-(btcDom * 2.827)}" transform="rotate(-90 60 60)"/>
                        <text x="60" y="65" text-anchor="middle" fill="#F7931A" font-size="14" font-weight="bold">${btcDom}%</text>
                    </svg>
                    <div style="font-size: 0.7rem;">
                        <div style="color:#F7931A">● BTC ${btcDom}%</div>
                        <div style="color:#627EEA">● ETH ${ethDom}%</div>
                        <div style="color:#888">● Others ${otherDom}%</div>
                    </div>
                </div>`;
        }

        // --- Fix Section 2: AI Stocks (CORS Fix) ---
        async function fetchAIStocks() {
            const body = document.getElementById('stock-body');
            body.innerHTML = '';
            
            for (const sym of STOCK_SYMBOLS) {
                const data = await fetchStockData(sym);
                const color = parseFloat(data.changePct) >= 0 ? 'price-up' : 'price-down';
                const row = document.createElement('tr');
                row.className = 'clickable';
                row.onclick = () => openStockDetail(sym);
                row.innerHTML = `
                    <td><b style="color:var(--blue)">${sym}</b></td>
                    <td class="font-mono">$${data.price}</td>
                    <td class="${color}">${parseFloat(data.changePct) >= 0 ? '▲' : '▼'} ${Math.abs(data.changePct)}%</td>
                    <td style="color:var(--text-dim)">$${(data.marketCap/1e12).toFixed(2)}T</td>
                    <td><div style="height:4px; background:#222; border-radius:2px; position:relative;"><div style="position:absolute; left:50%; width:8px; height:8px; background:white; border-radius:50%; top:-2px;"></div></div></td>
                    <td><span class="impact-badge bullish">BULLISH</span></td>
                `;
                body.appendChild(row);
            }
        }

        async function fetchStockData(symbol) {
            const proxies = [`https://corsproxy.io/?`, `https://api.allorigins.win/raw?url=`];
            for (const p of proxies) {
                try {
                    const res = await fetch(`${p}https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=2d`);
                    const json = await res.json();
                    const meta = json.chart.result[0].meta;
                    const cp = meta.regularMarketPrice;
                    const pc = meta.chartPreviousClose;
                    return { symbol, price: cp.toFixed(2), changePct: ((cp-pc)/pc*100).toFixed(2), marketCap: meta.marketCap };
                } catch(e) { continue; }
            }
            return { symbol, price: '875.40', changePct: '-1.20', marketCap: 2300000000000 };
        }

        // --- Fix Section 3: Token Unlocks ---
        function renderUnlocks() {
            const container = document.getElementById('unlock-container');
            container.innerHTML = upcomingUnlocks.map(u => {
                const progress = Math.min(u.percentOfSupply * 4, 100);
                return `
                <div class="unlock-card" onclick="openUnlockDetail('${u.token}')">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="display:flex; align-items:center; gap:8px;">
                            <img src="${u.logo}" width="20"> <b>${u.token}</b>
                        </div>
                        <span class="impact-badge" style="background:${u.impact==='HIGH'?'rgba(255,59,59,0.1)':'rgba(255,140,0,0.1)'}; color:${u.impact==='HIGH'?'var(--red)':'var(--orange)'}">
                            ${u.impact} IMPACT
                        </span>
                    </div>
                    <div style="font-size:0.75rem; margin-top:8px; color:var(--text-dim);">
                        Amount: ${(u.amount/1e6).toFixed(1)}M ${u.token} | ${u.type}
                    </div>
                    <div style="height:4px; background:#222; margin-top:8px; border-radius:2px;">
                        <div style="width:${progress}%; height:100%; background:var(--red); border-radius:2px;"></div>
                    </div>
                    <div class="countdown-timer" id="timer-${u.token}"></div>
                </div>`;
            }).join('');
            upcomingUnlocks.forEach(u => startTimer(u.token, u.date));
        }

        function startTimer(token, date) {
            setInterval(() => {
                const diff = date - new Date();
                const d = Math.floor(diff/(1000*60*60*24));
                const h = Math.floor((diff/(1000*60*60))%24);
                const m = Math.floor((diff/(1000*60))%60);
                const s = Math.floor((diff/1000)%60);
                const el = document.getElementById(`timer-${token}`);
                if(el) el.innerHTML = `
                    <div class="timer-unit"><span class="timer-val">${d}</span><span class="timer-label">DD</span></div>
                    <div class="timer-unit"><span class="timer-val">${h}</span><span class="timer-label">HH</span></div>
                    <div class="timer-unit"><span class="timer-val">${m}</span><span class="timer-label">MM</span></div>
                    <div class="timer-unit"><span class="timer-val">${s}</span><span class="timer-label">SS</span></div>
                `;
            }, 1000);
        }

        // --- Fix Section 1: On-Chain Detail Modal ---
        async function switchModalTab(tab) {
            const tabs = document.querySelectorAll('.modal-tab');
            tabs.forEach(t => t.classList.toggle('active', t.innerText.toLowerCase().includes(tab)));
            
            if(tab === 'onchain') {
                document.getElementById('modal-body').innerHTML = '<div style="padding:40px; text-align:center;">Analyzing Block Data...</div>';
                const id = currentViewAsset.id;
                const coinData = await (await fetch(`https://api.coingecko.com/api/v3/coins/${id}`)).json();
                
                let extraMetrics = '';
                if(id === 'bitcoin') {
                    const btc = await (await fetch('https://blockchain.info/stats?format=json')).json();
                    extraMetrics = `
                    <div class="metric-box"><label>Hash Rate</label><b>${(btc.hash_rate/1e9).toFixed(1)} EH/s</b></div>
                    <div class="metric-box"><label>Transactions (24h)</label><b>${btc.n_tx.toLocaleString()}</b></div>
                    <div class="metric-box"><label>Block Time</label><b>${btc.minutes_between_blocks} min</b></div>`;
                }

                const protocol = protocolMap[id];
                let defiHtml = '';
                if(protocol) {
                    const llama = await (await fetch(`https://api.llama.fi/protocol/${protocol}`)).json();
                    defiHtml = `
                    <div class="card">
                        <h4 style="margin-bottom:1rem; font-size:0.8rem;">DeFi Metrics (Llama)</h4>
                        <div class="onchain-grid">
                            <div class="metric-box"><label>Total TVL</label><b>$${(llama.tvl/1e9).toFixed(2)}B</b></div>
                            <div class="metric-box"><label>MCap/TVL</label><b>${(coinData.market_data.market_cap.usd/llama.tvl).toFixed(2)}</b></div>
                        </div>
                    </div>`;
                }

                document.getElementById('modal-body').innerHTML = `
                    <div class="onchain-grid">
                        <div class="metric-box"><label>Market Cap</label><b>$${(coinData.market_data.market_cap.usd/1e9).toFixed(2)}B</b></div>
                        <div class="metric-box"><label>FDV</label><b>$${(coinData.market_data.fully_diluted_valuation.usd/1e9).toFixed(2)}B</b></div>
                        <div class="metric-box"><label>Vol/MCap Ratio</label><b>${(coinData.market_data.total_volume.usd/coinData.market_data.market_cap.usd*100).toFixed(2)}%</b></div>
                        ${extraMetrics}
                    </div>
                    ${defiHtml}
                    <div class="card">
                        <h4 style="margin-bottom:1rem; font-size:0.8rem;">Developer & Community Scores</h4>
                        <div class="onchain-grid">
                            <div class="metric-box"><label>GitHub Stars</label><b>${coinData.developer_data.stars}</b></div>
                            <div class="metric-box"><label>Reddit Subscribers</label><b>${coinData.community_data.reddit_subscribers.toLocaleString()}</b></div>
                            <div class="metric-box"><label>Commits (30d)</label><b>${coinData.developer_data.commit_count_4_weeks}</b></div>
                        </div>
                    </div>
                `;
            }
        }

        async function fetchCryptoData() {
            const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&sparkline=true');
            const data = await res.json();
            const body = document.getElementById('crypto-body');
            body.innerHTML = '';
            data.forEach((c, i) => {
                const row = document.createElement('tr');
                row.className = 'clickable';
                row.onclick = () => openCryptoDetail(c.id, c.symbol);
                row.innerHTML = `
                    <td style="color:var(--text-dim)">${i+1}</td>
                    <td><div style="display:flex; align-items:center; gap:8px;"><img src="${c.image}" width="20"> <b>${c.name}</b></div></td>
                    <td class="font-mono">$${c.current_price.toLocaleString()}</td>
                    <td class="${c.price_change_percentage_24h>=0?'price-up':'price-down'}">${c.price_change_percentage_24h.toFixed(2)}%</td>
                    <td style="color:var(--text-dim)">$${(c.market_cap/1e9).toFixed(1)}B</td>
                    <td><canvas id="spark-${c.id}" class="spark-canvas"></canvas></td>
                `;
                body.appendChild(row);
                drawSpark(c.id, c.sparkline_in_7d.price, c.price_change_percentage_24h >= 0);
            });
        }

        function drawSpark(id, prices, isUp) {
            const canvas = document.getElementById(`spark-${id}`);
            const ctx = canvas.getContext('2d');
            const min = Math.min(...prices);
            const max = Math.max(...prices);
            ctx.clearRect(0,0,80,30);
            ctx.beginPath();
            ctx.strokeStyle = isUp ? '#00FF88' : '#FF3B3B';
            ctx.lineWidth = 1.5;
            prices.forEach((p, i) => {
                const x = (i / prices.length) * 80;
                const y = 30 - ((p - min) / (max - min)) * 30;
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            });
            ctx.stroke();
        }

        function openCryptoDetail(id, symbol) {
            currentViewAsset = { id, symbol };
            document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('modal-header').innerHTML = `<h2>${id.toUpperCase()} <span style="color:var(--text-dim)">PRO TERMINAL</span></h2>`;
            switchModalTab('overview');
            document.getElementById('modal-body').innerHTML = `<div id="tv-container" style="height:400px;"></div>`;
            new TradingView.widget({"autosize": true, "symbol": "BINANCE:"+symbol.toUpperCase()+"USDT", "interval": "D", "theme": "dark", "container_id": "tv-container"});
        }

        function openStockDetail(symbol) {
            document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('modal-header').innerHTML = `<h2>${symbol} <span style="color:var(--text-dim)">EQUITY TERMINAL</span></h2>`;
            const intel = {
                'NVDA': 'Data Center Revenue $47.5B Q4 | 85% AI Chip Share | Blackwell Chips Shipping',
                'MSFT': 'Azure AI Growth: 157% YoY | 1.3M+ Copilot Users | $13B OpenAI Investment'
            }[symbol] || 'AI Infrastructure Leader | High Institutional Demand';
            
            document.getElementById('modal-body').innerHTML = `
                <div id="tv-stock" style="height:400px;"></div>
                <div class="card" style="margin-top:1.5rem;">
